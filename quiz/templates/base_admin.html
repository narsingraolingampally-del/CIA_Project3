<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CIA Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    position:fixed;
    width:250px;
    height:100vh;
    background:#212529;
    color:white;
}

.sidebar h3{
    padding:20px;
    text-align:center;
    background:#0d6efd;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px 20px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#0d6efd;
}

.content{
    margin-left:260px;
    padding:30px;
}

.dashboard-card{
    border:none;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.count{
    font-size:35px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>CIA ADMIN</h3>

<a href="{% url 'admin_dashboard' %}">
<i class="fas fa-gauge"></i>
 Dashboard
</a>

<a href="{% url 'manage_faculty' %}">
<i class="fas fa-user-tie"></i>
 Faculty
</a>

<a href="{% url 'manage_students' %}">
<i class="fas fa-user-graduate"></i>
 Students
</a>

<a href="{% url 'manage_courses' %}">
<i class="fas fa-book"></i>
 Courses
</a>

<a href="{% url 'manage_subjects' %}">
<i class="fas fa-book-open"></i>
 Subjects
</a>

<a href="{% url 'manage_exams' %}">
<i class="fas fa-file-circle-check"></i>
 Exams
</a>

<a href="{% url 'admin_reports' %}">
<i class="fas fa-chart-bar"></i>
 Reports
</a>

<a href="{% url 'logout' %}">
<i class="fas fa-right-from-bracket"></i>
 Logout
</a>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CIA Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.sidebar{

    position:fixed;
    left:0;
    top:0;

    width:250px;
    height:100vh;

    background:#0d6efd;

    color:white;

}

.logo{

    padding:25px;

    text-align:center;

    background:#084298;

}

.logo h3{

    margin-bottom:5px;

}

.sidebar ul{

    list-style:none;

    padding:0;

}

.sidebar ul li{

    width:100%;

}

.sidebar ul li a{

    color:white;

    display:block;

    padding:15px 25px;

    text-decoration:none;

    transition:.3s;

}

.sidebar ul li a:hover{

    background:#0b5ed7;

    padding-left:35px;

}

.content{

    margin-left:250px;

}

.topbar{

    background:white;

    padding:15px 30px;

    box-shadow:0 3px 10px rgba(0,0,0,.1);

}

.page{

    padding:30px;

}

.card{

    border:none;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.08);

}

</style>

</head>

<body>

{% include 'includes/admin_sidebar.html' %}

<div class="content">

<div class="topbar d-flex justify-content-between">

<h3>CIA Examination System</h3>

<div>

Welcome,

<strong>{{ request.user.username }}</strong>

</div>

</div>

<div class="page">

{% block content %}

{% endblock %}

</div>

</div>

</body>

</html>

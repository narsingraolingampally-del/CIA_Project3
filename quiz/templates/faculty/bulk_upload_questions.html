{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-success text-white py-3">
                    <h4 class="mb-0"><i class="bi bi-file-earmark-excel me-2"></i>Bulk Upload Questions</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Upload an Excel file (.xlsx) containing your quiz questions.</p>
                    
                    <form method="POST" enctype="multipart/form-data" action="{% url 'bulk_upload_questions' %}">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold">Select Excel File</label>
                            <input type="file" name="excel_file" class="form-control" accept=".xlsx, .xls" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Upload & Import</button>
                            <a href="{% url 'faculty_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                    <hr>
                    <div class="mt-3">
                        <small class="text-info"><i class="bi bi-info-circle me-1"></i> Ensure your Excel columns match: Question, Option1, Option2, Option3, Option4, Answer.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>CIA Admin Panel</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Segoe UI',sans-serif;
background:#f4f6f9;

}

/* Sidebar */

.sidebar{

position:fixed;

top:0;

left:0;

width:260px;

height:100vh;

background:#1f2937;

color:white;

overflow:auto;

}

.sidebar h3{

padding:20px;

text-align:center;

background:#111827;

font-weight:bold;

letter-spacing:1px;

}

.sidebar a{

display:block;

padding:15px 20px;

color:white;

text-decoration:none;

transition:.3s;

font-size:15px;

}

.sidebar a:hover{

background:#2563eb;

padding-left:30px;

}

.sidebar i{

width:25px;

}

/* Main Area */

.main{

margin-left:260px;

}

/* Top Navbar */

.topbar{

height:65px;

background:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 30px;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.profile{

font-weight:bold;

color:#444;

}

/* Content */

.content{

padding:30px;

}

/* Dashboard Cards */

.dashboard-card{

border:none;

border-radius:12px;

transition:.3s;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.dashboard-card:hover{

transform:translateY(-6px);

}

.count{

font-size:35px;

font-weight:bold;

}

/* Tables */

.card{

border:none;

border-radius:12px;

}

.table{

margin-bottom:0;

}

.table th{

background:#1f2937;

color:white;

}

.btn{

border-radius:8px;

}

</style>

</head>

<body>

{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2>Published Exams</h2>

<table class="table table-hover">

<thead class="table-danger">

<tr>

<th>Subject</th>

<th>Course</th>

<th>Semester</th>

<th>Date</th>

</tr>

</thead>

<tbody>

{% for e in exams %}

<tr>

<td>{{ e.subject }}</td>

<td>{{ e.course }}</td>

<td>{{ e.semester }}</td>

<td>{{ e.exam_date }}</td>

</tr>

{% empty %}

<tr>

<td colspan="4">No Published Exams</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}

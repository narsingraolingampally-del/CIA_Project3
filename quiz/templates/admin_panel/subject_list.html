{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">

        <h2>Subjects</h2>

        <a href="{% url 'add_subject' %}" class="btn btn-primary">
            Add Subject
        </a>

    </div>

    <table class="table table-bordered table-striped">

        <thead class="table-info">

            <tr>

                <th>Code</th>
                <th>Subject</th>
                <th>Course</th>
                <th>Semester</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

        {% for subject in subjects %}

            <tr>

                <td>{{ subject.code }}</td>
                <td>{{ subject.name }}</td>
                <td>{{ subject.course }}</td>
                <td>{{ subject.semester }}</td>

                <td>

                    <a href="{% url 'edit_subject' subject.id %}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a href="{% url 'delete_subject' subject.id %}" class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </td>

            </tr>

        {% empty %}

            <tr>

                <td colspan="5">
                    No Subjects Found
                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
